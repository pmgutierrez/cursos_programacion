<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practica de Flex en hijos</title>
    <link rel="stylesheet" href="css/son.css" />
  </head>
  <body>
    <div class="contenedor-search">
      <input class="search" type="text" placeholder="Buscar productos..." />
      <button class="btn">Buscar</button>
    </div>
    <section class="contenedor-card">
      <div class="card">
        <h3>Producto 1</h3>
        <p>Este es de texto corto</p>
        <button>Comprar</button>
      </div>
      <div class="card">
        <h3>Producto 2</h3>
        <p>Este es de texto corto de un renglon</p>
        <button>Comprar</button>
      </div>
      <div class="card">
        <h3>Producto 3</h3>
        <p>
          Este es de texto largo porque describo el producto en su totalidad.
        </p>
        <button>Comprar</button>
      </div>
    </section>
    <footer>
      <div class="footer-legal">
        <h2>Mi empresa S.A.</h2>
        <p>Diseno y desarrollo de Paginas Web.</p>
      </div>

      <nav class="footer-menu">
        <ul>
          <li>Inicio</li>
          <li>Seccion1</li>
          <li>Contactos</li>
        </ul>
      </nav>
      <div class="footer-redes">
        <a href="">Instagram</a>
        <a href="">Facebook</a>
        <a href="">Whatsapp</a>
      </div>
    </footer>
  </body>
</html>
